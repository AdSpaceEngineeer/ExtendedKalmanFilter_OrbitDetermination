<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Range and range-rate residuals</title>
  <desc id="desc">Residual RMS decreases as the EKF assimilates sequential range and range-rate observations.</desc>
  <rect width="760" height="420" fill="#0b1117"/>
  <text x="44" y="42" fill="#eef5f7" font-family="Arial" font-size="24" font-weight="700">Measurement Residuals</text>
  <line x1="82" y1="188" x2="700" y2="188" stroke="#405464"/>
  <line x1="82" y1="78" x2="82" y2="188" stroke="#405464"/>
  <line x1="82" y1="344" x2="700" y2="344" stroke="#405464"/>
  <line x1="82" y1="234" x2="82" y2="344" stroke="#405464"/>
  <text x="94" y="74" fill="#a9bbc7" font-family="Arial" font-size="14">Range RMS (km)</text>
  <text x="94" y="230" fill="#a9bbc7" font-family="Arial" font-size="14">Range-rate RMS (m/s)</text>
  <text x="352" y="386" fill="#a9bbc7" font-family="Arial" font-size="15">Time (min)</text>
  <polyline points="92,98 160,126 228,144 296,158 364,168 432,174 520,179 608,182 690,184" fill="none" stroke="#62d2c6" stroke-width="4"/>
  <polyline points="92,254 160,282 228,300 296,316 364,326 432,334 520,338 608,341 690,342" fill="none" stroke="#f5c85b" stroke-width="4"/>
  <rect x="508" y="88" width="180" height="72" rx="8" fill="#101820" stroke="#2c3f4d"/>
  <line x1="526" y1="112" x2="572" y2="112" stroke="#62d2c6" stroke-width="4"/>
  <text x="584" y="117" fill="#eef5f7" font-family="Arial" font-size="14">Range</text>
  <line x1="526" y1="138" x2="572" y2="138" stroke="#f5c85b" stroke-width="4"/>
  <text x="584" y="143" fill="#eef5f7" font-family="Arial" font-size="14">Range-rate</text>
</svg>
