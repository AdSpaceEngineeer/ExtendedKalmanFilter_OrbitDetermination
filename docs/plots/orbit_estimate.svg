<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" role="img" aria-labelledby="title desc">
  <title id="title">True vs EKF estimated orbit</title>
  <desc id="desc">A compact orbit plot showing near overlap between truth and EKF estimated trajectory.</desc>
  <rect width="760" height="460" fill="#0b1117"/>
  <text x="44" y="42" fill="#eef5f7" font-family="Arial" font-size="24" font-weight="700">True vs EKF Estimated Orbit</text>
  <line x1="82" y1="388" x2="700" y2="388" stroke="#405464"/>
  <line x1="82" y1="70" x2="82" y2="388" stroke="#405464"/>
  <text x="366" y="430" fill="#a9bbc7" font-family="Arial" font-size="15">ECI x-y projection (km)</text>
  <ellipse cx="382" cy="232" rx="246" ry="112" fill="none" stroke="#62d2c6" stroke-width="5"/>
  <ellipse cx="386" cy="229" rx="245" ry="111" fill="none" stroke="#f5c85b" stroke-width="3" stroke-dasharray="12 8"/>
  <circle cx="136" cy="232" r="6" fill="#eef5f7"/>
  <text x="150" y="226" fill="#eef5f7" font-family="Arial" font-size="14">start</text>
  <rect x="536" y="84" width="156" height="74" rx="8" fill="#101820" stroke="#2c3f4d"/>
  <line x1="554" y1="108" x2="600" y2="108" stroke="#62d2c6" stroke-width="5"/>
  <text x="612" y="113" fill="#eef5f7" font-family="Arial" font-size="14">Truth</text>
  <line x1="554" y1="134" x2="600" y2="134" stroke="#f5c85b" stroke-width="3" stroke-dasharray="10 7"/>
  <text x="612" y="139" fill="#eef5f7" font-family="Arial" font-size="14">EKF estimate</text>
</svg>
