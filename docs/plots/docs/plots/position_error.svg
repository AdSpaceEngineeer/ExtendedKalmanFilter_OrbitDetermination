<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">EKF position error and covariance bound</title>
  <desc id="desc">Position error remains below the three-sigma covariance envelope after sequential updates.</desc>
  <rect width="760" height="420" fill="#0b1117"/>
  <text x="44" y="42" fill="#eef5f7" font-family="Arial" font-size="24" font-weight="700">Position Error and Covariance Bound</text>
  <line x1="82" y1="342" x2="700" y2="342" stroke="#405464"/>
  <line x1="82" y1="76" x2="82" y2="342" stroke="#405464"/>
  <g stroke="#263846" stroke-width="1">
    <line x1="82" y1="276" x2="700" y2="276"/>
    <line x1="82" y1="210" x2="700" y2="210"/>
    <line x1="82" y1="144" x2="700" y2="144"/>
  </g>
  <text x="352" y="384" fill="#a9bbc7" font-family="Arial" font-size="15">Time (min)</text>
  <text x="20" y="238" fill="#a9bbc7" font-family="Arial" font-size="15" transform="rotate(-90 20 238)">Error (km)</text>
  <polyline points="90,152 150,238 220,286 300,314 390,326 500,333 620,337 690,339" fill="none" stroke="#62d2c6" stroke-width="4"/>
  <polyline points="90,108 150,166 220,218 300,254 390,282 500,304 620,318 690,324" fill="none" stroke="#f5c85b" stroke-width="3" stroke-dasharray="10 7"/>
  <rect x="500" y="86" width="194" height="74" rx="8" fill="#101820" stroke="#2c3f4d"/>
  <line x1="518" y1="110" x2="566" y2="110" stroke="#62d2c6" stroke-width="4"/>
  <text x="578" y="115" fill="#eef5f7" font-family="Arial" font-size="14">Position error</text>
  <line x1="518" y1="136" x2="566" y2="136" stroke="#f5c85b" stroke-width="3" stroke-dasharray="10 7"/>
  <text x="578" y="141" fill="#eef5f7" font-family="Arial" font-size="14">3-sigma bound</text>
</svg>
